spring.application.name=Day23UserManagementApplication

#management.endpoints.web.exposure.include=health,metrics,beans,info,mappings
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.info.env.enabled=true

#spring.security.user.name=admin
#spring.security.user.password=admin123

spring.profiles.active=dev
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.datasource.url=jdbc:mysql://mysql-db:3306/devdb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.password=root
management.info.env.enabled=true
server.port=8085